name: babynote
description: "Global baby-care recording app (KR/JP/EN). Flutter + Supabase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend / data
  supabase_flutter: ^2.8.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.4
  logger: ^2.5.0

  # Observability
  # NOTE — 9.x로 올린 이유: 8.x가 Kotlin language version 1.6을 명시하는데
  # 최신 Kotlin compiler(2.x)는 1.6 미만을 거부함. 9.x는 LV 1.8+ 사용해서 정상 빌드됨.
  sentry_flutter: ^9.0.0

  # 이미지 선택 (이유식 사진 첨부 등)
  # 갤러리/카메라 선택 + 자동 압축. iOS Info.plist에 NSCameraUsageDescription /
  # NSPhotoLibraryUsageDescription 추가 필요 (iOS 빌드 시점에).
  image_picker: ^1.1.2

  # 외부 앱 딥링크 (tel:, https://maps.google.com, geo: 등).
  # 단골 병원 전화/길찾기에 사용. AndroidManifest의 <queries>에 intent 선언 필요할 수도.
  url_launcher: ^6.3.0

  # 통계 화면 차트 — 지난 7일 수유/수면/기저귀 + 성장 곡선.
  # fl_chart는 가벼운 순수 Dart 라이브러리(WebView 등 무거운 의존성 없음).
  fl_chart: ^0.69.2

  # 로컬 알림 — 분유/기저귀 곧 소진, 다가오는 예방접종 알림.
  # Firebase Push 없이도 디바이스 내에서 시각 기반 스케줄 가능.
  flutter_local_notifications: ^18.0.1
  # zonedSchedule 호출에 IANA timezone 필요 (Asia/Seoul 등).
  timezone: ^0.10.0

  # 데이터 내보내기 — CSV 파일 생성 후 시스템 공유 시트로 전달.
  # share_plus는 임시 파일 path를 받아 안드로이드/iOS 공유 시트(이메일/Drive 등) 표시.
  # path_provider는 앱의 임시 디렉터리 경로 조회.
  share_plus: ^10.1.2
  path_provider: ^2.1.5

  # 홈 화면 위젯 (Android 우선) — 잠금 화면에서 1탭으로 빠른 기록 진입.
  # Flutter ↔ native(Kotlin/Swift) 데이터 sync + 탭 이벤트 수신.
  # 위젯 UI 자체는 Android RemoteViews/Glance, iOS WidgetKit으로 작성.
  home_widget: ^0.7.0
  http: ^1.6.0
  lottie: ^3.3.3
  google_fonts: ^8.1.0
  tutorial_coach_mark: ^1.3.3
  purchases_flutter: ^10.0.2

  # ── 오프라인 쓰기 큐 (E-B 작업) ─────────────────────────────────────
  # 네트워크 없을 때 INSERT/UPDATE/DELETE 를 로컬 SQLite 큐에 저장,
  # 재연결 시 자동 flush. Brick 전면 도입은 후속 작업으로 미룸 (스펙 §8.3).
  sqflite: ^2.4.1
  path: ^1.9.1
  connectivity_plus: ^6.0.5

  # NOTE — packages added in later phases (kept here for reference; uncomment when needed):
  # # Offline-first 전면 (Phase 3 — Supabase ↔ 로컬 SQLite 동기화)
  # brick_offline_first_with_supabase: ^2.1.0
  # # Local DB 고급 — drift 대안
  # drift: ^2.22.0
  # # Push + local notifications (Phase 3 — depletion / vaccine alerts)
  # firebase_messaging: ^15.1.6
  # flutter_local_notifications: ^18.0.1
  # # Payments (Phase 4 — multi-child paywall)
  # purchases_flutter: ^8.4.2
  # # Social login — KR (Phase 5)
  # kakao_flutter_sdk_user: ^1.9.7
  # flutter_naver_login: ^1.8.0
  # # Social login — JP (Phase 5)
  # flutter_line_sdk: ^2.5.0
  # # Social login — global (Phase 5)
  # sign_in_with_apple: ^6.1.4
  # google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

  # 앱 아이콘 자동 생성 (PNG 1장 → Android mipmap 5종 + iOS appiconset 14종)
  # 실행: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.0

  # NOTE — added with their runtime counterparts later:
  # brick_offline_first_with_supabase_build: ^2.x  # brick 전면 도입 시
  # drift_dev: ^2.22.0          # with drift

flutter:
  uses-material-design: true
  generate: true  # enables flutter_localizations ARB → Dart codegen
  assets:
    - assets/lottie/    # Lottie 애니메이션 (.json) — 없으면 BabyLoading이 fallback

# ── flutter_launcher_icons 설정 ────────────────────────────────────────────
# `dart run flutter_launcher_icons` 실행 시 image_path 의 PNG를 기준으로
# Android (mipmap-mdpi ~ xxxhdpi 5종) + iOS (AppIcon.appiconset 14종) 자동 생성.
# adaptive_icon_background 는 Android 8+ Adaptive Icon 의 배경 단색.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/launcher_icon.png"
  remove_alpha_ios: true                       # iOS는 투명 배경 금지 → 자동으로 흰색 깔아줌
  # adaptive icon은 Android가 외곽 33%를 잘라(67% 안전영역)서 박스가 작게 보임.
  # → legacy 아이콘만 사용 (mipmap-* PNG 그대로). launcher가 모양만 적용.
  # adaptive_icon_background: "#FFE6BB"
  # adaptive_icon_foreground: "assets/launcher_icon.png"
  min_sdk_android: 29

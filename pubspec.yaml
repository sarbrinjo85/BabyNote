flutter:
  uses-material-design: true
  generate: true  # enables flutter_localizations ARB вҶ’ Dart codegen
  assets:
    - assets/lottie/    # Lottie м• лӢҲл©”мқҙм…ҳ (.json) вҖ” м—Ҷмңјл©ҙ BabyLoadingмқҙ fallback

# в”Җв”Җ flutter_launcher_icons м„Өм • в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# `dart run flutter_launcher_icons` мӢӨн–ү мӢң image_path мқҳ PNGлҘј кё°мӨҖмңјлЎң
# Android (mipmap-mdpi ~ xxxhdpi 5мў…) + iOS (AppIcon.appiconset 14мў…) мһҗлҸҷ мғқм„ұ.
# adaptive_icon_background лҠ” Android 8+ Adaptive Icon мқҳ л°°кІҪ лӢЁмғү.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/launcher_icon.png"
  remove_alpha_ios: true                       # iOSлҠ” нҲ¬лӘ… л°°кІҪ кёҲм§Җ вҶ’ мһҗлҸҷмңјлЎң нқ°мғү к№”м•„мӨҢ
  # adaptive iconмқҖ Androidк°Җ мҷёкіҪ 33%лҘј мһҳлқј(67% м•Ҳм „мҳҒм—ӯ)м„ң л°•мҠӨк°Җ мһ‘кІҢ ліҙмһ„.
  # вҶ’ legacy м•„мқҙмҪҳл§Ң мӮ¬мҡ© (mipmap-* PNG к·ёлҢҖлЎң). launcherк°Җ лӘЁм–‘л§Ң м Ғмҡ©.
  # adaptive_icon_background: "#FFE6BB"
  # adaptive_icon_foreground: "assets/launcher_icon.png"
  min_sdk_android: 29
